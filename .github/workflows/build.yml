name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle Wrapper jar
        # The wrapper jar is not committed (binary). Generate it from the Gradle distribution.
        # Uses a minimal settings-only project so no plugins are resolved at this step.
        run: |
          mkdir -p /tmp/wrapper-gen
          echo "rootProject.name = 'wrapper-gen'" > /tmp/wrapper-gen/settings.gradle
          wget -q "https://services.gradle.org/distributions/gradle-8.6-bin.zip" \
               -O /tmp/gradle-8.6.zip
          unzip -q /tmp/gradle-8.6.zip -d /tmp/gradle-dist
          mkdir -p gradle/wrapper
          /tmp/gradle-dist/gradle-8.6/bin/gradle \
            -p /tmp/wrapper-gen \
            wrapper --gradle-version 8.6 --distribution-type bin
          cp /tmp/wrapper-gen/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/
          ls -lh gradle/wrapper/

      - name: Restore wrapper properties
        # The 'gradle wrapper' task may have overwritten our properties file
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: haver-digital-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Release APK (debug-signed)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: haver-digital-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
